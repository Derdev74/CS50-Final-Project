{% extends "layout.html" %}
{% block title %}Edit Transaction{% endblock %}
{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Edit Transaction</h2>
    
    <div class="card">
        <div class="card-body">
            <form method="post" action="{{ url_for('edit_transaction', transaction_id=transaction.id) }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="row g-3">
                    <div class="col-md-3">
                        <label for="date" class="form-label">Date</label>
                        <input type="date" id="date" name="date" class="form-control" 
                               value="{{ transaction.date[:10] }}" required>
                    </div>
                    
                    <div class="col-md-3">
                        <label for="amount" class="form-label">Amount</label>
                        <input type="number" id="amount" name="amount" class="form-control" 
                               step="0.01" min="0.01" 
                               value="{{ transaction.amount|abs }}" required>
                    </div>
                    
                    <div class="col-md-3">
                        <label for="category_id" class="form-label">Category</label>
                        <select id="category_id" name="category_id" class="form-select" required>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}" 
                                    {% if cat.id == transaction.category_id %}selected{% endif %}>
                                {{ cat.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="col-md-3">
                        <label for="description" class="form-label">Description</label>
                        <input type="text" id="description" name="description" 
                               class="form-control" maxlength="500"
                               value="{{ transaction.description }}" required>
                    </div>
                </div>
                
                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">Update Transaction</button>
                    <a href="{{ url_for('transactions') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
